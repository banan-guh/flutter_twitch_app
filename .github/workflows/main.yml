name: Build Release Assets (iOS & Android)

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --- JOB 1: ANDROID BUILD ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Prepare APK Asset
        run: |
          mkdir -p build/release-assets
          TAG_NAME="${{ github.ref_name }}"
          REPO_NAME="${{ github.event.repository.name }}"
          cp build/app/outputs/flutter-apk/app-release.apk "build/release-assets/${REPO_NAME}-${TAG_NAME}.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-asset
          path: build/release-assets/*.apk

  # --- JOB 2: IOS BUILD ---
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned iOS IPA
        run: flutter build ipa --no-codesign

      - name: Package payload into downloadable .ipa
        run: |
          mkdir -p build/release-assets
          TAG_NAME="${{ github.ref_name }}"
          REPO_NAME="${{ github.event.repository.name }}"
          cd build/ios/archive/Runner.xcarchive/Products/Applications
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r "$GITHUB_WORKSPACE/build/release-assets/${REPO_NAME}-${TAG_NAME}.ipa" Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-asset
          path: build/release-assets/*.ipa

  # --- JOB 3: PUBLISH TO GITHUB RELEASE ---
  publish-release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/release-assets
          merge-multiple: true

      - name: Upload Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/release-assets/*