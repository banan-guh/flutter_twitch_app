name: Build Release Assets (iOS & Android)

on:
  release:
    types: [published] # Triggers for both regular Releases and Pre-releases
  push:
    tags:
      - 'v*' # Triggers when you push tags like v1.0.0 or v1.0.0-beta
  workflow_dispatch: # Allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # --- BUILD ANDROID APK ---
      - name: Build Android APK
        run: flutter build apk --release

      - name: Copy APK to release folder
        run: |
          mkdir -p build/release-assets
          TAG_NAME="${{ github.ref_name }}"
          REPO_NAME="${{ github.event.repository.name }}"
          cp build/app/outputs/flutter-apk/app-release.apk "build/release-assets/${REPO_NAME}-${TAG_NAME}.apk"

      # --- BUILD IOS IPA ---
      - name: Build unsigned iOS IPA
        run: flutter build ipa --no-codesign

      - name: Package payload into downloadable .ipa
        run: |
          TAG_NAME="${{ github.ref_name }}"
          REPO_NAME="${{ github.event.repository.name }}"
          cd build/ios/archive/Runner.xcarchive/Products/Applications
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r "$GITHUB_WORKSPACE/build/release-assets/${REPO_NAME}-${TAG_NAME}.ipa" Payload

      # --- ATTACH RAW FILES TO GITHUB RELEASE ---
      - name: Upload Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        with:
          files: build/release-assets/*
